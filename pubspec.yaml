name: mycycle
description: "Personal menstrual cycle tracker built for two."
publish_to: 'none'
version: 1.0.1+5

environment:
  sdk: ^3.11.5

dependencies:
  cloud_firestore: ^6.3.0
  cupertino_icons: ^1.0.8
  equatable: ^2.0.8
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
