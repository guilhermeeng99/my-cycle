name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    name: Build and distribute
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate slang i18n
        run: dart run slang

      - name: Static analysis
        run: flutter analyze

      - name: Tests
        run: flutter test

      # Replace the +<buildNumber> in pubspec.yaml with the GitHub Actions
      # run number so each distributed APK gets a unique, monotonically
      # increasing versionCode without anyone needing to bump pubspec.yaml
      # manually. The semver part (X.Y.Z) is preserved — bump that by hand
      # when you want a meaningful version label.
      - name: Bump build number to GITHUB_RUN_NUMBER
        run: |
          SEMVER=$(grep -E "^version:" pubspec.yaml | sed -E 's/version: ([0-9]+\.[0-9]+\.[0-9]+)\+.*/\1/')
          NEW_VERSION="${SEMVER}+${GITHUB_RUN_NUMBER}"
          sed -i "s/^version: .*$/version: ${NEW_VERSION}/" pubspec.yaml
          echo "Bumped version to: ${NEW_VERSION}"
          grep -E "^version:" pubspec.yaml

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          ls -l android/app/upload-keystore.jks

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${KEYSTORE_PASSWORD}
          keyPassword=${KEYSTORE_PASSWORD}
          keyAlias=upload
          storeFile=upload-keystore.jks
          EOF
          # Sanity check (does not print the password value):
          grep -c '^storeFile=' android/key.properties
          grep -c '^keyAlias=' android/key.properties

      - name: Build release APK
        run: flutter build apk --release

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:1071997209882:android:6e39d874729fcbf0a070a3
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: casal
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            Build automático
            Commit: ${{ github.sha }}
            Mensagem: ${{ github.event.head_commit.message }}
